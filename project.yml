name: LifeOS
options:
  bundleIdPrefix: com.yashlunawat
  deploymentTarget:
    iOS: "17.0"
targets:
  LifeOS:
    type: application
    platform: iOS
    sources: LifeOS/Sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        DEBUG_INFORMATION_FORMAT: dwarf
        SUPPORTS_MACCATALYST: "YES"

  LifeOSWidget:
    type: app-extension
    platform: iOS
    sources: LifeOSWidget/Sources
    dependencies:
      - target: LifeOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
        SKIP_INSTALL: "YES"

  LifeOSTests:
    type: bundle.unit-test
    platform: iOS
    sources: LifeOSTests
    dependencies:
      - target: LifeOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

  LifeOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: LifeOSUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  LifeOS:
    build:
      targets:
        LifeOS: all
        LifeOSTests: [test]
        LifeOSUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LifeOSTests
        - LifeOSUITests
