name: LifeOS
options:
  bundleIdPrefix: com.yashlunawat
  deploymentTarget:
    iOS: "17.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "8.0.0"

targets:
  LifeOS:
    type: application
    platform: iOS
    sources: LifeOS/Sources
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAnalytics
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        DEBUG_INFORMATION_FORMAT: dwarf
        SUPPORTS_MACCATALYST: "YES"
    info:
      path: LifeOS/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.116536834156-slm340hod3qac81oiicbvia4r7n3i0p4

  LifeOSWidget:
    type: app-extension
    platform: iOS
    sources: LifeOSWidget/Sources
    dependencies:
      - target: LifeOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
        SKIP_INSTALL: "YES"

  LifeOSTests:
    type: bundle.unit-test
    platform: iOS
    sources: LifeOSTests
    dependencies:
      - target: LifeOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

  LifeOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: LifeOSUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  LifeOS:
    build:
      targets:
        LifeOS: all
        LifeOSTests: [test]
        LifeOSUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LifeOSTests
        - LifeOSUITests
