name: LifeOS
options:
  bundleIdPrefix: com.yashlunawat
  deploymentTarget:
    iOS: "17.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "8.0.0"

targets:
  LifeOS:
    type: application
    platform: iOS
    sources: LifeOS/Sources
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAnalytics
      - package: GoogleSignIn
        product: GoogleSignIn
      - target: LifeOSWidget
        embed: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        DEBUG_INFORMATION_FORMAT: dwarf
        SUPPORTS_MACCATALYST: "YES"
    info:
      path: LifeOS/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.116536834156-slm340hod3qac81oiicbvia4r7n3i0p4
              - lifeos
    entitlements:
      path: LifeOS/LifeOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yashlunawat.LifeOS

  LifeOSWidget:
    type: app-extension
    platform: iOS
    sources:
      - LifeOSWidget/Sources
      - path: LifeOS/Sources/Core/Services/SharedData.swift
        buildPhase: sources
    info:
      path: LifeOSWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.yashlunawat.LifeOS.LifeOSWidget"
        SKIP_INSTALL: "YES"
    entitlements:
      path: LifeOSWidget/LifeOSWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yashlunawat.LifeOS

  LifeOSTests:
    type: bundle.unit-test
    platform: iOS
    sources: LifeOSTests
    dependencies:
      - target: LifeOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

  LifeOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: LifeOSUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  LifeOS:
    build:
      targets:
        LifeOS: all
        LifeOSWidget: all
        LifeOSTests: [test]
        LifeOSUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LifeOSTests
        - LifeOSUITests
